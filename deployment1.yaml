apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-deployment
  namespace: unnati  # Aligned with your Jenkins user3 RBAC namespace restriction

spec:
  replicas: 3

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx

    spec:
      containers:
      - name: nginx-container
        image: nginx:latest

        ports:
        - containerPort: 80

        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"

          limits:
            memory: "128Mi"
            cpu: "500m"
